<!DOCTYPE html>
<html ng-app="blogApp">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MEAN Blog - MongoDB, Express, Angular, Node.js</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 0;
        }

        nav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            padding: 15px 0;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .page-header h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .auth-container {
            max-width: 450px;
            margin: 50px auto;
        }

        .card {
            border: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border: none;
        }

        .card-header h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .create-post-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .create-post-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
        }

        .post-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .post-card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .post-title {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .post-meta {
            font-size: 13px;
            color: #999;
            margin-bottom: 15px;
        }

        .post-author {
            font-weight: 600;
            color: #667eea;
        }

        .post-content {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        textarea {
            resize: vertical;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <span class="navbar-brand">📝 MEAN Blog</span>
            <div class="ms-auto d-flex align-items-center gap-3">
                <div id="userInfo" style="display: none;" class="user-info">
                    <span id="username"></span>
                    <div class="user-avatar" id="userAvatar"></div>
                    <button onclick="logout()" class="btn-logout">Logout</button>
                </div>
                <div id="guestLinks" style="display: none;">
                    <button onclick="showLogin()" class="btn-logout">Sign In</button>
                    <button onclick="showRegister()" class="btn-logout" style="margin-left: 10px;">Register</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="alert alert-danger" id="errorAlert" role="alert"></div>
        <div class="alert alert-success" id="successAlert" role="alert"></div>

        <!-- Login Form -->
        <div id="loginSection" style="display: none;">
            <div class="auth-container">
                <div class="card">
                    <div class="card-header">
                        <h2>MEAN Blog</h2>
                        <p>Sign in to your account</p>
                    </div>
                    <div class="card-body">
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" class="form-control" id="loginUsername" required>
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" class="form-control" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Sign In</button>
                        </form>
                        <div class="auth-link">
                            Don't have an account? <a href="#" onclick="showRegister()">Register</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerSection" style="display: none;">
            <div class="auth-container">
                <div class="card">
                    <div class="card-header">
                        <h2>MEAN Blog</h2>
                        <p>Create your account</p>
                    </div>
                    <div class="card-body">
                        <form id="registerForm" onsubmit="handleRegister(event)">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" class="form-control" id="registerUsername" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" class="form-control" id="registerEmail" required>
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" class="form-control" id="registerPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Create Account</button>
                        </form>
                        <div class="auth-link">
                            Already have an account? <a href="#" onclick="showLogin()">Sign in</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div id="dashboardSection" style="display: none;">
            <div class="page-header">
                <h1>Welcome to MEAN Blog</h1>
                <p>Share your thoughts with our community</p>
            </div>

            <div class="create-post-section">
                <h2><i class="bi bi-pencil-fill"></i> Create New Post</h2>
                <form id="postForm" onsubmit="handleCreatePost(event)">
                    <div class="form-group">
                        <label>Post Title</label>
                        <input type="text" class="form-control" id="postTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea class="form-control" id="postContent" rows="6" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Publish Post</button>
                </form>
            </div>

            <h2 style="color: white; margin-bottom: 25px;">Recent Posts</h2>
            <div id="posts"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let token = localStorage.getItem('token');

        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            if (token) {
                loadPosts();
            }
        });

        async function checkAuth() {
            if (token) {
                try {
                    const response = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        currentUser = await response.json();
                        showDashboard();
                    } else {
                        logout();
                    }
                } catch (error) {
                    logout();
                }
            } else {
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('guestLinks').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('guestLinks').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('guestLinks').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('username').textContent = currentUser.username;
            document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
        }

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    currentUser = data.user;
                    showSuccess('Logged in successfully!');
                    setTimeout(() => checkAuth(), 1000);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Connection error');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('Account created! Redirecting to login...');
                    setTimeout(() => showLogin(), 1500);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Connection error');
            }
        }

        async function handleCreatePost(event) {
            event.preventDefault();
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;

            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, content })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('Post published!');
                    document.getElementById('postForm').reset();
                    loadPosts();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Connection error');
            }
        }

        async function loadPosts() {
            try {
                const response = await fetch('/api/posts');
                const posts = await response.json();

                const postsContainer = document.getElementById('posts');
                if (posts.length === 0) {
                    postsContainer.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>No posts yet</p></div>';
                } else {
                    postsContainer.innerHTML = posts.map(post => `
                        <div class="post-card">
                            <div class="post-title">${post.title}</div>
                            <div class="post-meta">
                                <span class="post-author">✍️ ${post.author}</span> • 📅 ${new Date(post.createdAt).toLocaleDateString()}
                            </div>
                            <div class="post-content">${post.content}</div>
                            ${currentUser && currentUser._id === post.userId._id ? `<button class="btn-delete" onclick="deletePost('${post._id}')">Delete</button>` : ''}
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading posts:', error);
            }
        }

        async function deletePost(id) {
            if (!confirm('Are you sure?')) return;

            try {
                const response = await fetch(`/api/posts/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    showSuccess('Post deleted!');
                    loadPosts();
                } else {
                    showError('Failed to delete post');
                }
            } catch (error) {
                showError('Connection error');
            }
        }

        function logout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            showLogin();
        }

        function showError(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
