<section class="card auth-card">
  <h1 class="page-title">Create your account</h1>
  <p class="page-subtitle">Join the community and start publishing your own blogs.</p>
  <div *ngIf="error" class="alert">{{ error }}</div>
  <form class="form-grid" (ngSubmit)="submit()">
    <label>
      Username
      <input [(ngModel)]="form.username" name="username" required />
    </label>
    <label>
      Email
      <input type="email" [(ngModel)]="form.email" name="email" required />
    </label>
    <label>
      Password
      <input type="password" [(ngModel)]="form.password" name="password" required />
    </label>
    <button type="submit" [disabled]="loading">{{ loading ? 'Creating account...' : 'Register' }}</button>
  </form>
</section>
