<section class="card">
  <h1 class="page-title">Welcome to the MEAN Blog</h1>
  <p class="page-subtitle">Read the latest stories from the community and share your own.</p>
  <div *ngIf="authService.isAuthenticated()" class="actions">
    <a routerLink="/create">Create a new post</a>
  </div>
</section>

<div *ngIf="loading" class="card">Loading posts...</div>
<div *ngIf="error" class="alert">{{ error }}</div>

<div class="posts-list" *ngIf="!loading">
  <article class="card post-card" *ngFor="let post of posts">
    <h2>{{ post.title }}</h2>
    <p class="meta">By {{ post.author }} • {{ post.createdAt | date: 'mediumDate' }}</p>
    <p>{{ post.content }}</p>
    <a class="read-link" [routerLink]="['/posts', post._id]">Read more</a>
  </article>
</div>
