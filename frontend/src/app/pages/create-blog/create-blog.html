<section class="card">
  <h1 class="page-title">Create a new blog post</h1>
  <p class="page-subtitle">Share your latest ideas with the community.</p>
  <div *ngIf="error" class="alert">{{ error }}</div>
  <form class="form-grid" (ngSubmit)="submit()">
    <label>
      Title
      <input [(ngModel)]="form.title" name="title" required />
    </label>
    <label>
      Content
      <textarea [(ngModel)]="form.content" name="content" required></textarea>
    </label>
    <button type="submit" [disabled]="loading">{{ loading ? 'Publishing...' : 'Publish post' }}</button>
  </form>
</section>
